# NakshatraVerse — Docker Compose (Priority 5.2 deployment prep)
# Brings up backend + frontend together. Copy backend/.env.example to
# backend/.env (and frontend/.env.example to frontend/.env) and fill in
# real values before running `docker compose up --build`.
version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8617:8617"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
    volumes:
      - nakshatraverse-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8617}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "5187:5187"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nakshatraverse-data:
